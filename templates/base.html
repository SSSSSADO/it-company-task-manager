<!DOCTYPE html>
<html lang="en">

<head>
  {% block title %}
    <title>Taxi Service</title>
  {% endblock %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<header style="padding: 10px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">

  <div>
    <a href="{% url 'manager:index' %}"><strong>Manager</strong></a>
  </div>

  <nav style="display: flex; gap: 15px;">

    {% if user.is_authenticated %}
      <a href="{% url 'manager:task-list' %}">Tasks</a>
      <a href="{% url 'manager:worker-list' %}">Workers</a>
      <a href="{% url 'manager:position-list' %}">Positions</a>
      <a href="{% url 'manager:task-type-list' %}">Task Types</a>

      <!-- Logout -->
      <form method="post" action="{% url 'manager:logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Logout</button>
      </form>

    {% else %}
      <a href="{% url 'manager:login' %}">Login</a>
      <a href="{% url 'manager:register' %}">Register</a>
    {% endif %}

  </nav>
</header>

<div style="padding: 20px;">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
