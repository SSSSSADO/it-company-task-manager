<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  {% block title %}
    <title>Taxi Service</title>
  {% endblock %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<header>
    <!-- Левый блок: название сайта -->
    <div class="header-left">
        <a href="{% url 'manager:index' %}"><strong>Taxi Service</strong></a>
    </div>

    <!-- Центр: меню -->
    <div class="header-center">
        {% if user.is_authenticated %}
            <a href="{% url 'manager:task-list' %}">Tasks</a>
            <a href="{% url 'manager:worker-list' %}">Workers</a>
            <a href="{% url 'manager:position-list' %}">Positions</a>
            <a href="{% url 'manager:task-type-list' %}">Task Types</a>
        {% endif %}
    </div>

    <!-- Правый блок: Login / Logout -->
    <div class="header-right">
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'manager:logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'manager:login' %}">Login</a>
            <a href="{% url 'manager:register' %}">Register</a>
        {% endif %}
    </div>
</header>

<!-- Контент по центру (6/12 колонки) -->
<div class="content-container">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
