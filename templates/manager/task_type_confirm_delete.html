{% extends "base.html" %}

{% block title %}
  <title>Delete Task Type</title>
{% endblock %}

{% block content %}
  <h1>Delete task type: {{ task_type.name }}</h1>
  <p>Are you sure you want to delete this task type?</p>

  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Delete">
  </form>
{% endblock %}
