{% extends "base.html" %}

{% block title %}
  <title>Position Detail</title>
{% endblock %}

{% block content %}
  {% if position.workers.all %}
    <ul>
      {% for worker in position.workers.all %}
        <li>
          <a href="{{ worker.get_absolute_url }}">{{ worker.username }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    There are no employees in this position.
  {% endif %}
{% endblock %}
