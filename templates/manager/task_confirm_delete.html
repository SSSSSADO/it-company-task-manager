{% extends "base.html" %}

{% block title %}
  <title>Delete Task</title>
{% endblock %}

{% block content %}
  <h1>Delete task: {{ task.name }}</h1>
  <p>Are you sure you want to delete this task?</p>

  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Delete">
  </form>
{% endblock %}
