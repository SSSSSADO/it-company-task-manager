{% extends "base.html" %}

{% block title %}
  <title>Position List</title>
{% endblock %}

{% block content %}
  {% if position_list %}
    <ul>
      {% for position in position_list %}
        <li>
          {{ position.name }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <h3>No positions found</h3>
  {% endif %}
{% endblock %}
