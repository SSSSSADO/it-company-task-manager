{% extends "base.html" %}

{% block title %}
  <title>Position List</title>
{% endblock %}

{% block content %}
  {% if position_list %}
    <ul>
      {% for position in position_list %}
        <li>
          <a href="{% url 'manager:position-detail' pk=position.id %}">{{ position.name }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <h3>No positions found</h3>
  {% endif %}
{% endblock %}
