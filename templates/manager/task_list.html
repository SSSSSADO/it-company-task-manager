{% extends "base.html" %}

{% block title %}
  <title>Task List</title>
{% endblock %}

{% block content %}
  <a href="{% url 'manager:task-create' %}">Create new Task</a>
  {% if task_list %}
    <ul>
      {% for task in task_list %}
        <li>
          <a href="{{ task.get_absolute_url }}">{{ task.name }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <h3>No tasks found</h3>
  {% endif %}
{% endblock %}
